<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Coupe's log</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="p-5 mb-5 text-white bg-dark position-relative"
     style="background: url('/images/logo.jpg') no-repeat center center/cover; height: 250px;">

  <!-- 글씨 영역 -->
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
    <h1 class="mb-3">Coupelog</h1>
    <h4 class="mb-3">Game, Dev, Sports, etc...</h4>
  </div>
</div>


<div class="container">

  <!-- 카테고리 필터 버튼 영역 -->
  <div class="mb-3 text-center">
    <a th:each="cat : ${categories}"
       th:href="@{/category/{c}(c=${cat})}"
       th:text="${cat.label}"
       class="btn btn-outline-primary btn-sm mx-1">
    </a>
  </div>

  <!-- 글 등록 버튼 -->
  <button type="button" id="create-btn"
          th:onclick="|location.href='@{/new-article}'|"
          class="btn btn-secondary btn-sm mb-3">글 등록</button>

  <!-- 글 목록 카드 -->
  <div class="row-6" th:each="item : ${articles}">
    <div class="card">
      <div class="card-header" th:text="${item.id}">
      </div>
      <div class="card-body">
        <h5 class="card-title" th:text="${item.title}"></h5>
        <p class="card-text" th:text="${item.content}"></p>
        <a th:href="@{/articles/{id}(id=${item.id})}" class="btn btn-primary">보러가기</a>
      </div>
    </div>
    <br>
  </div>
</div>

<script src="/js/article.js"></script>
</body>
</html>
