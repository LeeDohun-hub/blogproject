<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>블로그 글</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
  <style>
    .top-bar {
      position: absolute;
      top: 15px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-weight: 500;
      font-size: 1rem;
    }

    .category-link {
      color: white;
      text-decoration: none;
      padding: 5px 0;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .category-link:hover {
      border-bottom: 2px solid white;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #ff6666;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }
    .logout-btn:hover {
      color: #ff3333;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="p-5 mb-5 text-white bg-dark position-relative"
     style="background: url('/images/logo.jpg') no-repeat center center/cover; height: 250px;">

  <!-- 상단 카테고리 & 로그인/로그아웃 -->
  <div class="top-bar">
    <!-- 카테고리 -->
    <div>
      <a th:each="cat : ${categories}"
         th:href="@{/category/{c}(c=${cat})}"
         th:text="${cat.label}"
         class="category-link mx-2">
      </a>
    </div>

    <!-- 로그인/로그아웃 -->
    <div>
      <div th:if="${#authorization.expression('isAuthenticated()')}">
        <form th:action="@{/logout}" method="post" style="margin:0;">
          <button type="submit" class="logout-btn">로그아웃</button>
        </form>
      </div>
      <div th:if="${!#authorization.expression('isAuthenticated()')}">
        <a href="/login" class="category-link">로그인</a>
      </div>
    </div>
  </div>

  <!-- 가운데 로고/타이틀 -->
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
    <h1 class="mb-3">
      <a th:href="@{/}" style="color: white; text-decoration: none;">Coupelog</a>
    </h1>
    <h4 class="mb-3">Game, Dev, Sports, etc...</h4>
  </div>
</div>

<!-- 본문 -->
<div class="container mt-5">
  <div class="row">
    <div class="col-lg-8">
      <article>
        <input type="hidden" id="article-id" th:value="${article.id}">
        <header class="mb-4">
          <h1 class="fw-bolder mb-1" th:text="${article.title}"></h1>
          <div class="text-muted fst-italic mb-2"
               th:text="|Posted on ${#temporals.format(article.createdAt, 'yyyy-MM-dd HH:mm')}|"></div>
        </header>
        <section class="mb-5">
          <p class="fs-5 mb-4" th:text="${article.content}"></p>
        </section>
        <button type="button" id="modify-btn"
                th:onclick="|location.href='@{/new-article?id={articleId}(articleId=${article.id})}'|"
                class="btn btn-primary btn-sm">수정</button>
        <button type="button" id="delete-btn" class="btn btn-secondary btn-sm">삭제</button>
      </article>
    </div>
  </div>
</div>

<script src="/js/article.js"></script>
</body>
</html>
